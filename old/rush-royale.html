<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rush Royale - Deck Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-panel: #1c2333;
            --bg-hover: #21293a;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #6e7681;
            --text-bright: #f0f6fc;
            --gold: #ffa726;
            --gold-light: #ffcc80;
            --gold-dark: #e65100;
            --legendary: #ff8f00;
            --epic: #aa00ff;
            --rare: #2979ff;
            --common: #546e7a;
            --tier-s: #ff1744;
            --tier-a: #ff9100;
            --tier-b: #448aff;
            --tier-c: #78909c;
            --tier-d: #455a64;
            --green: #00e676;
            --pvp: #ff5252;
            --coop: #69f0ae;
            --f2p: #40c4ff;
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Exo 2', 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* === HEADER === */
        .header {
            background: linear-gradient(180deg, #1a1025 0%, var(--bg-dark) 100%);
            border-bottom: 1px solid var(--border);
            padding: 0;
        }
        .header-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
        }
        .logo-icon {
            width: 42px; height: 42px; border-radius: 10px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 800; color: #fff;
            box-shadow: 0 0 15px rgba(255,167,38,0.3);
        }
        .logo-text {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700; font-size: 1.5em; letter-spacing: 1px;
        }
        .logo-text span:first-child { color: var(--gold); }
        .logo-text span:last-child { color: var(--text-dim); font-weight: 500; }
        .header-stats {
            display: flex; gap: 20px; font-size: 0.85em; color: var(--text-dim);
        }
        .header-stats strong { color: var(--gold); }

        /* === NAV TABS === */
        .nav-bar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; gap: 0; padding: 0 24px;
        }
        .nav-tab {
            padding: 14px 28px; cursor: pointer; font-weight: 600; font-size: 0.92em;
            color: var(--text-dim); border-bottom: 3px solid transparent;
            transition: all 0.2s; position: relative;
        }
        .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.02); }
        .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
        .nav-tab .badge {
            background: var(--gold-dark); color: #fff; font-size: 0.7em;
            padding: 1px 7px; border-radius: 10px; margin-left: 6px; font-weight: 700;
        }

        /* === MAIN === */
        .main { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

        /* === TOOLBAR (filters + selected bar) === */
        .toolbar {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 14px 18px; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
            position: sticky; top: 0; z-index: 100;
        }
        .toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .toolbar-right { display: flex; align-items: center; gap: 10px; }

        .pill {
            padding: 5px 14px; border-radius: 20px; font-size: 0.8em; font-weight: 600;
            border: 1px solid var(--border); background: transparent; color: var(--text-dim);
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .pill:hover { border-color: var(--gold); color: var(--text); }
        .pill.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .search-input {
            padding: 6px 14px; border-radius: 20px; font-size: 0.85em;
            border: 1px solid var(--border); background: var(--bg-dark); color: var(--text);
            width: 180px; transition: border-color 0.2s;
        }
        .search-input:focus { outline: none; border-color: var(--gold); }
        .search-input::placeholder { color: var(--text-dim); }

        .counter { font-weight: 700; color: var(--green); font-size: 0.9em; }
        .save-ind { color: var(--green); font-size: 0.75em; opacity: 0; transition: opacity 0.4s; margin-left: 6px; }
        .save-ind.show { opacity: 1; }

        .btn {
            padding: 8px 20px; border: none; border-radius: var(--radius); font-size: 0.85em;
            font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #fff; }
        .btn-gold:hover { box-shadow: 0 4px 15px rgba(255,167,38,0.4); transform: translateY(-1px); }
        .btn-ghost { background: transparent; color: var(--pvp); border: 1px solid rgba(255,82,82,0.3); }
        .btn-ghost:hover { background: rgba(255,82,82,0.1); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        /* === CARDS GRID === */
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
        }

        .card {
            position: relative; background: var(--bg-card); border-radius: var(--radius);
            padding: 10px 4px 8px; text-align: center; cursor: pointer;
            border: 2px solid var(--border); transition: all 0.2s; user-select: none;
        }
        .card:hover { border-color: #555; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        .card.selected { border-color: var(--green); background: rgba(0,230,118,0.05); }
        .card .check-mark {
            position: absolute; top: 4px; right: 4px; width: 20px; height: 20px;
            background: var(--green); border-radius: 50%; display: none;
            align-items: center; justify-content: center; font-size: 11px; color: #000; font-weight: 800;
        }
        .card.selected .check-mark { display: flex; }

        .card-img {
            width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; overflow: hidden; position: relative;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .card-img::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            box-shadow: inset 0 -3px 6px rgba(0,0,0,0.4);
        }

        /* Rarity ring */
        .rarity-legendary .card-img { border: 3px solid var(--legendary); box-shadow: 0 0 10px rgba(255,143,0,0.3); }
        .rarity-epic .card-img { border: 3px solid var(--epic); box-shadow: 0 0 10px rgba(170,0,255,0.2); }
        .rarity-rare .card-img { border: 3px solid var(--rare); box-shadow: 0 0 10px rgba(41,121,255,0.2); }
        .rarity-common .card-img { border: 3px solid var(--common); }

        .card-label { font-size: 0.68em; line-height: 1.2; color: var(--text); font-weight: 500; }
        .tier-badge {
            display: inline-block; font-size: 0.6em; font-weight: 800; padding: 1px 8px;
            border-radius: 4px; margin-top: 3px; letter-spacing: 0.5px;
        }
        .tier-S { background: var(--tier-s); color: #fff; }
        .tier-A { background: var(--tier-a); color: #fff; }
        .tier-B { background: var(--tier-b); color: #fff; }
        .tier-C { background: var(--tier-c); color: #fff; }
        .tier-D { background: var(--tier-d); color: #ccc; }

        /* Tooltip */
        .tip {
            display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: #1a1f2e; border: 1px solid var(--border); border-radius: var(--radius);
            padding: 10px 12px; width: 210px; z-index: 200; text-align: left;
            font-size: 0.72em; line-height: 1.5; pointer-events: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
        }
        .card:hover .tip { display: block; }
        .tip-name { color: var(--gold); font-weight: 700; font-size: 1.1em; }
        .tip-role { color: var(--green); font-size: 0.9em; margin: 2px 0 4px; }
        .tip-desc { color: var(--text-dim); }

        /* === DECKS SECTION === */
        .decks-section { display: none; }
        .decks-section.visible { display: block; }

        .tier-group { margin-bottom: 28px; }
        .tier-group-head {
            font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; gap: 10px;
            font-size: 1.15em; font-weight: 700; padding: 8px 0; margin-bottom: 12px;
            border-bottom: 1px solid var(--border); color: var(--text);
        }

        .decks-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 12px;
        }

        .deck-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; transition: all 0.2s; position: relative;
        }
        .deck-card:hover { border-color: #444; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .deck-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .deck-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.05em; font-weight: 700; color: var(--text-bright);
        }
        .deck-match {
            font-size: 0.78em; font-weight: 700; padding: 3px 10px; border-radius: 4px; white-space: nowrap;
        }
        .match-100 { background: rgba(0,230,118,0.15); color: var(--green); }
        .match-80 { background: rgba(255,167,38,0.15); color: var(--gold); }
        .match-60 { background: rgba(255,167,38,0.1); color: var(--gold-light); }
        .match-low { background: rgba(255,82,82,0.1); color: #ff8a80; }
        .deck-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .tag {
            font-size: 0.7em; font-weight: 600; padding: 2px 10px;
            border-radius: 4px; letter-spacing: 0.3px;
        }
        .tag-pvp { background: rgba(255,82,82,0.12); color: var(--pvp); }
        .tag-coop { background: rgba(105,240,174,0.12); color: var(--coop); }
        .tag-f2p { background: rgba(64,196,255,0.12); color: var(--f2p); }
        .tag-trophies { background: rgba(255,167,38,0.1); color: var(--gold-light); }

        .deck-units { display: flex; gap: 6px; flex-wrap: wrap; }
        .deck-unit { text-align: center; width: 64px; }
        .deck-unit .card-img { width: 44px; height: 44px; margin: 0 auto 3px; font-size: 16px; }
        .deck-unit .card-label { font-size: 0.6em; color: var(--text-dim); }
        .deck-unit.is-missing { opacity: 0.2; }
        .deck-unit.is-owned .card-label { color: var(--green); }

        .deck-tip {
            font-size: 0.75em; color: var(--text-dim); margin-top: 10px;
            padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.04);
            line-height: 1.4;
        }

        .deck-missing-list {
            font-size: 0.72em; color: #ff8a80; margin-top: 6px;
        }

        .no-results { text-align: center; color: var(--text-dim); padding: 60px 20px; }
        .no-results p { margin-top: 8px; font-size: 0.9em; }

        .separator { color: var(--border); margin: 0 4px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        @media (max-width: 700px) {
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); gap: 6px; }
            .decks-grid { grid-template-columns: 1fr; }
            .header-inner { flex-direction: column; gap: 8px; }
            .header-stats { display: none; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-left, .toolbar-right { justify-content: center; }
            .nav-tab { padding: 12px 16px; font-size: 0.85em; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <div class="logo">
            <div class="logo-icon">RR</div>
            <div class="logo-text"><span>RUSH ROYALE</span> <span>Deck Builder</span></div>
        </div>
        <div class="header-stats">
            <span><strong id="totalUnits">65</strong> cartas</span>
            <span><strong id="totalDecks">52</strong> mazos</span>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-inner">
        <div class="nav-tab active" onclick="showTab('select')">Mis Cartas</div>
        <div class="nav-tab" onclick="showTab('decks')">Mejores Mazos <span class="badge" id="deckBadge">52</span></div>
    </div>
</div>

<div class="main">
    <!-- TAB: Card Selection -->
    <div id="tab-select">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="pill active" data-f="rarity" onclick="fRarity('all',this)">Todas</button>
                <button class="pill" data-f="rarity" onclick="fRarity('legendary',this)">Legendaria</button>
                <button class="pill" data-f="rarity" onclick="fRarity('epic',this)">Épica</button>
                <button class="pill" data-f="rarity" onclick="fRarity('rare',this)">Rara</button>
                <button class="pill" data-f="rarity" onclick="fRarity('common',this)">Común</button>
                <span class="separator">|</span>
                <button class="pill active" data-f="role" onclick="fRole('all',this)">Todos</button>
                <button class="pill" data-f="role" onclick="fRole('dps',this)">DPS</button>
                <button class="pill" data-f="role" onclick="fRole('support',this)">Support</button>
                <input type="text" class="search-input" placeholder="Buscar carta..." oninput="fSearch(this.value)">
            </div>
            <div class="toolbar-right">
                <span class="counter" id="selCount">0 seleccionadas</span>
                <span class="save-ind" id="saveInd">Guardado</span>
                <button class="btn btn-ghost" onclick="clearSel()">Limpiar</button>
                <button class="btn btn-gold" onclick="goToDecks()" id="findBtn" disabled>Buscar Mazos</button>
            </div>
        </div>
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <!-- TAB: Decks -->
    <div id="tab-decks" class="decks-section">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="pill active" data-f="dtype" onclick="fDeck('all',this)">Todos</button>
                <button class="pill" data-f="dtype" onclick="fDeck('PvP',this)">PvP</button>
                <button class="pill" data-f="dtype" onclick="fDeck('Co-op',this)">Co-op</button>
                <button class="pill" data-f="dtype" onclick="fDeck('F2P',this)">F2P</button>
                <span class="separator">|</span>
                <button class="pill active" data-f="dtier" onclick="fDTier('all',this)">Todos Tiers</button>
                <button class="pill" data-f="dtier" onclick="fDTier('S',this)">S</button>
                <button class="pill" data-f="dtier" onclick="fDTier('A',this)">A</button>
                <button class="pill" data-f="dtier" onclick="fDTier('B',this)">B</button>
                <button class="pill" data-f="dtier" onclick="fDTier('C',this)">C</button>
            </div>
            <div class="toolbar-right">
                <span class="counter" id="deckCount">52 mazos</span>
            </div>
        </div>
        <div id="decksOut"></div>
    </div>
</div>

// === STATE ===
let sel = new Set(JSON.parse(localStorage.getItem('rr_selected') || '[]'));
let fR = 'all', fRo = 'all', fS = '', fDt = 'all', fDTi = 'all';

function save() {
    localStorage.setItem('rr_selected', JSON.stringify([...sel]));
    const i = document.getElementById('saveInd');
    i.classList.add('show'); setTimeout(() => i.classList.remove('show'), 1200);
}

// === RENDER CARDS ===
function renderCards() {
    const g = document.getElementById('cardsGrid');
    const to = {S:0,A:1,B:2,C:3,D:4}, ro = {legendary:0,epic:1,rare:2,common:3};
    let f = U.filter(u => {
        if (fR !== 'all' && u.r !== fR) return false;
        if (fRo !== 'all' && u.role !== fRo) return false;
        if (fS && !u.name.toLowerCase().includes(fS.toLowerCase())) return false;
        return true;
    }).sort((a,b) => to[a.t]-to[b.t] || ro[a.r]-ro[b.r]);

    g.innerHTML = f.map(u => `
        <div class="card rarity-${u.r} ${sel.has(u.name)?'selected':''}" onclick="toggle('${u.name.replace(/'/g,"\\'")}')">
            <div class="check-mark">✓</div>
            <div class="card-img">${u.img?`<img src="${u.img}" alt="${u.name}" onerror="this.parentElement.textContent='${u.icon}'">`:u.icon}</div>
            <div class="card-label">${u.name}</div>
            <div class="tier-badge tier-${u.t}">${u.t}</div>
            <div class="tip"><div class="tip-name">${u.name}</div><div class="tip-role">${u.role==='dps'?'DPS':'Support'}</div><div class="tip-desc">${u.desc}</div></div>
        </div>
    `).join('');
    updCount();
}

function toggle(n) { sel.has(n)?sel.delete(n):sel.add(n); save(); renderCards(); }
function updCount() {
    const c = sel.size;
    document.getElementById('selCount').textContent = `${c} seleccionada${c!==1?'s':''}`;
    document.getElementById('findBtn').disabled = c < 5;
}
function clearSel() { sel.clear(); save(); renderCards(); }
function fRarity(v,b) { fR=v; document.querySelectorAll('[data-f="rarity"]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderCards(); }
function fRole(v,b) { fRo=v; document.querySelectorAll('[data-f="role"]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderCards(); }
function fSearch(v) { fS=v; renderCards(); }
function fDeck(v,b) { fDt=v; document.querySelectorAll('[data-f="dtype"]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderDecks(); }
function fDTier(v,b) { fDTi=v; document.querySelectorAll('[data-f="dtier"]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderDecks(); }

function showTab(tab) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    if (tab === 'select') {
        document.querySelectorAll('.nav-tab')[0].classList.add('active');
        document.getElementById('tab-select').style.display = 'block';
        document.getElementById('tab-decks').style.display = 'none';
    } else {
        document.querySelectorAll('.nav-tab')[1].classList.add('active');
        document.getElementById('tab-select').style.display = 'none';
        document.getElementById('tab-decks').style.display = 'block';
        document.getElementById('tab-decks').classList.add('visible');
        renderDecks();
    }
}
function goToDecks() { showTab('decks'); }

// === RENDER DECKS ===
function renderDecks() {
    const out = document.getElementById('decksOut');
    let decks = metaDecks.slice();

    // Filter by type
    if (fDt !== 'all') {
        if (fDt === 'F2P') decks = decks.filter(d => d.type.includes('F2P'));
        else decks = decks.filter(d => d.type.includes(fDt) && !d.type.includes('F2P'));
    }
    // Filter by tier
    if (fDTi !== 'all') decks = decks.filter(d => d.tier === fDTi);

    // Compute match info
    const hasSelection = sel.size >= 1;
    decks = decks.map(d => {
        const owned = d.cards.filter(c => sel.has(c));
        const missing = d.cards.filter(c => !sel.has(c));
        const pct = hasSelection ? Math.round((owned.length / d.cards.length) * 100) : -1;
        return {...d, owned, missing, pct};
    });

    // SORT: by match % desc, then by trophies desc, then tier
    const tv = {S:4,A:3,B:2,C:1,D:0};
    if (hasSelection) {
        decks.sort((a,b) => b.pct - a.pct || b.tr - a.tr || tv[b.tier] - tv[a.tier]);
    } else {
        decks.sort((a,b) => tv[b.tier] - tv[a.tier] || b.tr - a.tr);
    }

    document.getElementById('deckCount').textContent = `${decks.length} mazos`;

    if (decks.length === 0) {
        out.innerHTML = '<div class="no-results"><p>No hay mazos para estos filtros.</p></div>';
        return;
    }

    // Group by tier if no selection, flat list if selection
    if (hasSelection) {
        // Flat sorted list
        out.innerHTML = '<div class="decks-grid">' + decks.map(d => deckHTML(d)).join('') + '</div>';
    } else {
        // Grouped by tier
        let html = '';
        const tiers = ['S','A','B','C'];
        const labels = {S:'S-Tier — Meta Dominante',A:'A-Tier — Muy Fuerte',B:'B-Tier — Competitivo',C:'C-Tier — Principiante / F2P'};
        for (const t of tiers) {
            const td = decks.filter(d => d.tier === t);
            if (!td.length) continue;
            html += `<div class="tier-group">
                <div class="tier-group-head"><span class="tier-badge tier-${t}">${t}</span> ${labels[t]}</div>
                <div class="decks-grid">${td.map(d => deckHTML(d)).join('')}</div>
            </div>`;
        }
        out.innerHTML = html;
    }
}

function deckHTML(d) {
    const hasSelection = sel.size >= 1;
    const typeClass = d.type.includes('F2P') ? 'tag-f2p' : d.type.includes('Co-op') ? 'tag-coop' : 'tag-pvp';

    let matchHtml = '';
    if (d.pct >= 0) {
        const mc = d.pct === 100 ? 'match-100' : d.pct >= 80 ? 'match-80' : d.pct >= 60 ? 'match-60' : 'match-low';
        matchHtml = `<span class="deck-match ${mc}">${d.pct}%${d.pct===100?' ✓':''}</span>`;
    }

    const cardsHtml = d.cards.map(c => {
        const u = uMap[c];
        const miss = hasSelection && !sel.has(c);
        const own = hasSelection && sel.has(c);
        return `<div class="deck-unit ${miss?'is-missing':''} ${own?'is-owned':''}">
            <div class="card-img rarity-${u?u.r:'common'}">
                ${u&&u.img?'<img src="'+u.img+'" alt="'+c+'" onerror="this.parentElement.textContent=\''+(u?u.icon:'?')+'\'">':u?u.icon:'?'}
            </div>
            <div class="card-label">${c}</div>
        </div>`;
    }).join('');

    let missingHtml = '';
    if (d.pct >= 0 && d.pct < 100 && d.missing.length) {
        missingHtml = `<div class="deck-missing-list">Faltan: ${d.missing.join(', ')}</div>`;
    }

    return `<div class="deck-card">
        <div class="deck-header">
            <div class="deck-name">${d.name}</div>
            ${matchHtml}
        </div>
        <div class="deck-tags">
            <span class="tag ${typeClass}">${d.type}</span>
            ${d.tr ? '<span class="tag tag-trophies">🏆 '+d.tr+'+</span>' : ''}
            ${d.pct===100?'<span class="tag" style="background:rgba(0,230,118,0.12);color:var(--green)">Completo</span>':''}
        </div>
        <div class="deck-units">${cardsHtml}</div>
        ${missingHtml}
        ${d.tip?'<div class="deck-tip">'+d.tip+'</div>':''}
    </div>`;
}
