        const vertex_shader = `
        varying vec2 vUv;
        void main() {
         
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
        `;

        const fragment_shader = `
        uniform sampler2D texture;
        uniform float time;
        uniform int is_flicker;
        varying vec2 vUv;

        void main() {
               
            vec4 color = texture2D(texture, vec2(vUv.x, vUv.y));

            if ( is_flicker >  0){

                float alpha = sin(time * 10.0) * 0.5 + 0.5;

                gl_FragColor = vec4(color.rgb, 0.1 * alpha);
            }else{
                
                gl_FragColor = vec4(color);
            }
        }
        `;

        /* map を SZ-T046-051.png にする */
        var makeGeometry = function (_w, _h, _repeat) {
            // w x h の長方形を縦と横にrepeat個並べた形状を作成
            // uvは、w x hの長方形ごとに0.0 ~ 1.0になるように設定
            var positions = [];
            var uvs = [];

            for (var i = 0; i < _repeat; i++) {
                for (var j = 0; j < _repeat; j++) {
                    var x = _w * i;
                    var y = _h * j;
                    var uv_x = 1.0 / _repeat * i;
                    var uv_y = 1.0 / _repeat * j;

                    // 1
                    positions.push(x, y, 0.0);
                    uvs.push(uv_x, uv_y);

                    // 2
                    positions.push(x + _w, y, 0.0);
                    uvs.push(uv_x + 1.0 / _repeat, uv_y);

                    // 3
                    positions.push(x, y + _h, 0.0);
                    uvs.push(uv_x, uv_y + 1.0 / _repeat);

                    // 4
                    positions.push(x + _w, y, 0.0);
                    uvs.push(uv_x + 1.0 / _repeat, uv_y);

                    // 5
                    positions.push(x + _w, y + _h, 0.0);
                    uvs.push(uv_x + 1.0 / _repeat, uv_y + 1.0 / _repeat);

                    // 6
                    positions.push(x, y + _h, 0.0);
                    uvs.push(uv_x, uv_y + 1.0 / _repeat);
                }
            }

            var geometry = new THREE.BufferGeometry();
            geometry.addAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            geometry.addAttribute('uv', new THREE.BufferAttribute(new Float32Array(uvs), 2));

            return geometry;
        };

            var material = new THREE.ShaderMaterial({
                uniforms: {
                    texture: {
                        value: texture
                    },
                    time:{
                        value: 0.0
                    },
                    is_flicker:{
                        value: 0
                    }
                },
                vertexShader: vertex_shader,
                fragmentShader: fragment_shader,
                transparent: true,
                side: THREE.DoubleSide
            });
            var plane = new THREE.Mesh(geometry, material);
            plane.position.x = -(w)/2.0;
            plane.position.y = -(h)/2.0;
            plane.position.z = 0.0;
            plane.time_scale = time_scale;
            scene.add(plane);
            planes.push(plane);
            return plane;

        function hide_planes() {

            is_top = false;

            resize();

            for (var i = 0; i < planes.length; i++) {
                planes[i].visible = false;
            }

   
        }

        // [NEWS PAPER]
        function show_news_logos() {

    

            for (var i = 0; i < news_planes.length; i++) {
                news_planes[i].visible = true;
            }
        }

        var cnt = 0;
        // bodyをclickしたら、news logoを表示
        document.body.addEventListener('click', function() {
            if ( cnt == 0) {
                hide_planes();
                // show_news_logos();
                // #svg_containerを表示
                document.getElementById('svg_container').classList.remove('hide');
                cnt++;
            } else if (cnt == 1) {
                Cookies.set('landing_bypass_1218', 'true', {expires: 28});
                document.location = targetUrl;
            }
        });

        // [TOP]
        var START_Y_OFFSET = 2.6;
        for (var y = -3; y < 8; y++) {
            for (var x = -2; x < 3; x++) {
              var logo = makeCDGLogo(1.0, 0.1);
              logo.position.x = x * 1.0 * LOGO_SCALE;
              logo.position.y = y * 0.2641666 * LOGO_SCALE + START_Y_OFFSET;

              logo.position_start = {};
              logo.position_start.x = x * 1.0 * LOGO_SCALE;
              logo.position_start.y = y * 0.2641666 * LOGO_SCALE + START_Y_OFFSET;

              logo.position_end = {};
              logo.position_end.x = x * 1.0 * LOGO_SCALE;
              logo.position_end.y = y * 0.2641666 * LOGO_SCALE;
            }
        }
        
        // camera.position.z = 2.1;
        camera.position.z = 2.1;
        camera.position.x = 0.0;
        camera.position.y = -0.11;

        function easeOutBounce(x) {
            const n1 = 7.5625;
            const d1 = 2.75;

            if (x < 1 / d1) {
                return n1 * x * x;
            } else if (x < 2 / d1) {
                return n1 * (x -= 1.5 / d1) * x + 0.75;
            } else if (x < 2.5 / d1) {
                return n1 * (x -= 2.25 / d1) * x + 0.9375;
            } else {
                return n1 * (x -= 2.625 / d1) * x + 0.984375;
            }
        }
    
        var bounce_end_time = 0.5;
        var elapsed_time = 0.0;
        var animate = function () {
            requestAnimationFrame(animate);

            let delta = clock.getDelta();
            elapsed_time += delta * 0.7;

            if  (elapsed_time > 1.0){
                elapsed_time = 1.0;
            }

            for (var i = 0; i < planes.length; i++) {
                var plane = planes[i];
                plane.position.y = plane.position_end.y + START_Y_OFFSET * (1.0 - easeOutBounce(elapsed_time));
                planes[i].material.uniforms.time.value += delta*2.0;

            
                if (elapsed_time >= 0.999) {
                    if (planes[i].material.uniforms.is_flicker.value > 0 ) {
                        planes[i].flicker_elapsed_time += delta;
                        if (planes[i].flicker_elapsed_time > 0.025 + 0.015 * Math.random()){
                        
                            planes[i].material.uniforms.is_flicker.value = 0;
                        }
                    } else{
                        // ランダムで、フリッカーを適用
                        if (Math.random() > 0.992){    
                            planes[i].flicker_elapsed_time = 0.0;
                            planes[i].material.uniforms.is_flicker.value = 1;
                        }else{
                            planes[i].material.uniforms.is_flicker.value = 0;
                        }
                    }
                }
            }

            for (var i = 0; i < news_planes.length; i++) {
                var plane = news_planes[i];
                if(!plane.is_blink){
                    continue;
                }
                
                // plane.position.y = plane.position_end.y + START_Y_OFFSET * (1.0 - easeOutBounce(elapsed_time));
                plane.material.uniforms.time.value += delta*2.0;

                if (elapsed_time >= 0.999) {
                    if (plane.material.uniforms.is_flicker.value > 0 ) {
                        plane.flicker_elapsed_time += delta;
                        if (plane.flicker_elapsed_time > 0.025 + 0.015 * Math.random()) {
                            plane.material.uniforms.is_flicker.value = 0;
                        }
                    } else{
                        // ランダムで、フリッカーを適用
                        if (Math.random() > 0.992) {
                            plane.flicker_elapsed_time = 0.0;
                            plane.material.uniforms.is_flicker.value = 1;
                        } else {
                            plane.material.uniforms.is_flicker.value = 0;
                        }
                    }
                }
            }
            renderer.render(scene, camera);
        };

        animate();

        // frameの高さをすべて取得し、total_scroll_heightに代入
        function calc_total_scroll_height() {
            total_scroll_height = 0;
            var frames = document.getElementsByClassName('frame');
            for (var i = 0; i < frames.length; i++) {
                total_scroll_height += frames[i].clientHeight;
            }
        }

        calc_total_scroll_height();

        function easeOutQuart(x) {
            return 1 - Math.pow(1 - x, 4);
        }

        function easeOutCirc(x) {
            return Math.sqrt(1 - Math.pow(x - 1, 2));
        }

        function easeOutCubic(x){
            return 1 - Math.pow(1 - x, 3);
        }



        function resize() {

            let ratio = window.innerHeight/window.innerWidth;

            if ( is_top) {
                camera.position.z = 2.1 + 1.0 * (ratio); // 3.0
                camera.position.x = -0.4;
                camera.position.y = -0.11 + 0.4 * (ratio); //  -0.11 - + 0.3
            } else {

                camera.position.z = 1.6 + 0.6 * (ratio); // 3.0
                camera.position.x = -0.4;
                camera.position.x = 0.0;
                camera.position.y = 0.3; //  -0.11 - + 0.3
            }

            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

        }

        // window のリサイズ
        window.addEventListener('resize', function () {
            resize();
        });

        resize();
